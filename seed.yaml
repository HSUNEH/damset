evaluation_principles:
  - name: GymUsability
    description: 헬스장 운동 중 빠르게 보고 조작할 수 있어야 하며 앱을 반복적으로 여는 부담을 줄여야 한다.
    weight: 0.25
  - name: LockScreenCoreValue
    description: Live Activity에서 루틴 진행 상태 확인, 횟수 조정, 세트 완료, 휴식 확인이 실제로 가능해야 한다.
    weight: 0.25
  - name: WorkoutFlowCompleteness
    description: 기본 루틴 시작부터 세트 수행, 휴식, 다음 세트, 최종 기록 저장까지 한 번의 운동 흐름이 끊김 없이 완료되어야 한다.
    weight: 0.2
  - name: NativeAppleQuality
    description: SwiftUI, ActivityKit, Apple Design Resources/HIG에 맞는 iOS 네이티브 UI/UX를 제공해야 한다.
    weight: 0.15
  - name: DataAccuracy
    description: 세트별 실제 수행값, 총 세트 수, 총 볼륨, 시작/종료 시간이 정확히 기록되어야 한다.
    weight: 0.1
  - name: NotificationExperience
    description: 휴식 종료 cue와 진동이 제때 동작하고 운동 중 음악 경험을 방해하지 않는 것을 목표로 하며, iOS 제한 시 fallback이 문서화되어야 한다.
    weight: 0.05
exit_conditions:
  - name: MVPFlowComplete
    description: 기본 루틴 하나를 시작해 모든 세트를 완료하고 최종 운동 요약 기록이 저장된다.
    criteria: WorkoutSummary에 운동명, 세트별 실제 무게/횟수, 총 세트 수, 총 볼륨, 시작/종료 시간이 저장되고 최종 기록 화면에서 확인된다.
  - name: LockScreenWorkoutUsable
    description: 운동 중 Live Activity에서 핵심 진행 조작이 가능하다.
    criteria: 잠금 화면에서 목표 횟수 표시, -/+ 실제 횟수 조정, 세트 완료, 휴식 남은 시간, 재개 예정 시간이 동작한다.
  - name: RestNotificationVerified
    description: 휴식 종료 안내가 사용자를 다음 세트로 복귀시킨다.
    criteria: 휴식 종료 3초 전 카운트다운/경적 cue와 진동이 발생하며, 음악이 중단되지 않거나 iOS 제한으로 인한 fallback이 동작하고 문서화된다.
  - name: ScopeGuardSatisfied
    description: MVP 제외 범위를 구현하지 않고 핵심 범위에 집중한다.
    criteria: Apple Watch 앱, 커스텀 루틴 빌더, 잠금 화면 무게 수정/세트 추가/루틴 변경/휴식 변경, 크로스플랫폼 UI 프레임워크가 포함되지 않는다.
