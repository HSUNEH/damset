name: DamSet
options:
  bundleIdPrefix: com.hsuneh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
packages: {}
targets:
  DamSetCore:
    type: framework
    platform: iOS
    sources:
      - Sources/DamSetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.damset.core
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
  DamSet:
    type: application
    platform: iOS
    sources:
      - DamSetApp
      # Live Activity intents are compiled into the app too so LiveActivityIntent
      # runs perform() in the app process (shared session mutation pipeline).
      - DamSetLiveActivity/WorkoutIntents.swift
    entitlements:
      path: DamSetApp/DamSet.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hsuneh.damset
    dependencies:
      - target: DamSetCore
      - target: DamSetLiveActivity
        embed: true
    info:
      path: DamSetApp/Info.plist
      properties:
        CFBundleDisplayName: DamSet
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.damset
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  DamSetLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - DamSetLiveActivity
    entitlements:
      path: DamSetLiveActivity/DamSetLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hsuneh.damset
    dependencies:
      - target: DamSetCore
        embed: false
    info:
      path: DamSetLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: DamSet Live Activity
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.damset.liveactivity
        SKIP_INSTALL: YES
schemes:
  DamSet:
    build:
      targets:
        DamSet: all
        DamSetCore: all
        DamSetLiveActivity: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
